<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>PDF Metadata – PDFHub</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="shared.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
</head>
<body>
<nav>
  <a class="logo" href="../index.html">PDFHub</a>
  <div class="nav-right">
    <a class="back" href="../index.html"><i class="fas fa-chevron-left"></i> All Tools</a>
    <button class="theme-toggle" id="themeToggle" title="Toggle theme"><i class="fas fa-moon"></i></button>
  </div>
</nav>
<div class="tool-wrap">
  <div class="tool-header"><div class="tool-icon" style="color:var(--a6)"><i class="fas fa-info-circle"></i></div><h1>PDF Metadata</h1><p>View and edit basic PDF metadata (Title, Author, Subject, Keywords).</p></div>
  <div class="drop-area" id="drop" onclick="document.getElementById('fin').click()"><i class="fas fa-cloud-upload-alt"></i><div class="dl">Drop a PDF or click to upload</div></div>
  <input type="file" id="fin" accept=".pdf" hidden/>
  <div class="file-list" id="finfo"></div>
  <div id="metaForm" style="display:none;margin-top:12px;">
    <div class="opt-row"><label>Title</label><input id="mTitle"/></div>
    <div class="opt-row"><label>Author</label><input id="mAuthor"/></div>
    <div class="opt-row"><label>Subject</label><input id="mSubject"/></div>
    <div class="opt-row"><label>Keywords (comma-separated)</label><input id="mKeywords"/></div>
    <div class="action-row" style="margin-top:10px"><button class="btn btn-primary" id="saveBtn" onclick="saveMeta()">Save Metadata</button><button class="btn btn-secondary" onclick="location.reload()">Reset</button></div>
  </div>
  <div class="status" id="status"></div>
  <div class="progress" id="prog"><div class="progress-bar" id="pbar"></div></div>
</div>
<script>
let file=null, pdfDoc=null;
const drop=document.getElementById('drop'),fin=document.getElementById('fin');
fin.onchange=e=>{if(e.target.files[0])loadFile(e.target.files[0])};
drop.ondragover=e=>{e.preventDefault();drop.classList.add('over')};drop.ondragleave=()=>drop.classList.remove('over');
drop.ondrop=e=>{e.preventDefault();drop.classList.remove('over');const f=e.dataTransfer.files[0];if(f?.type==='application/pdf')loadFile(f)};
function showStatus(m,t){const s=document.getElementById('status');s.textContent=m;s.className='status show '+(t||'')}
async function loadFile(f){file=f;showStatus('Reading metadata…','info');try{const ab=await f.arrayBuffer();pdfDoc=await PDFLib.PDFDocument.load(ab,{ignoreEncryption:true});
  const info=pdfDoc.getTitle?{title:pdfDoc.getTitle(),author:pdfDoc.getAuthor(),subject:pdfDoc.getSubject(),keywords:pdfDoc.getKeywords&&Array.isArray(pdfDoc.getKeywords())?pdfDoc.getKeywords().join(', '):pdfDoc.getKeywords()||''}:{title:'',author:'',subject:'',keywords:''};
  document.getElementById('finfo').innerHTML=`<div class="file-item"><i class="fas fa-file-pdf"></i><span class="fn">${f.name}</span><span class="fs">${(f.size/1024/1024).toFixed(2)} MB</span></div>`;
  document.getElementById('mTitle').value=info.title||'';document.getElementById('mAuthor').value=info.author||'';document.getElementById('mSubject').value=info.subject||'';document.getElementById('mKeywords').value=info.keywords||'';
  document.getElementById('metaForm').style.display='block';showStatus('','');}catch(e){showStatus('Error: '+e.message,'error')}}
async function saveMeta(){if(!pdfDoc||!file)return;const btn=document.getElementById('saveBtn');btn.disabled=true;document.getElementById('prog').classList.add('show');document.getElementById('pbar').style.width='20%';showStatus('Saving metadata…','info');
  try{const title=document.getElementById('mTitle').value;const author=document.getElementById('mAuthor').value;const subject=document.getElementById('mSubject').value;const keywords=document.getElementById('mKeywords').value;
    if(title)pdfDoc.setTitle(title);if(author)pdfDoc.setAuthor(author);if(subject)pdfDoc.setSubject(subject);if(keywords)pdfDoc.setKeywords(keywords.split(',').map(s=>s.trim()).filter(Boolean));
    const bytes=await pdfDoc.save();const blob=new Blob([bytes],{type:'application/pdf'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=(file.name.replace(/\.pdf$/i,'')||'metadata')+'-metadata.pdf';a.click();document.getElementById('pbar').style.width='100%';showStatus('✓ Metadata saved — download started.','success');
  }catch(e){showStatus('Error: '+e.message,'error')}btn.disabled=false}

// Theme toggle
const themeToggle = document.getElementById('themeToggle');const html = document.documentElement;
function initTheme(){const saved=localStorage.getItem('theme')||'dark';html.setAttribute('data-theme',saved);updateThemeToggle(saved)}
function updateThemeToggle(theme){themeToggle.innerHTML = theme==='dark'?'<i class="fas fa-sun"></i>':'<i class="fas fa-moon"></i>'}
themeToggle.addEventListener('click',()=>{const cur=html.getAttribute('data-theme');const nxt=cur==='dark'?'light':'dark';html.setAttribute('data-theme',nxt);localStorage.setItem('theme',nxt);updateThemeToggle(nxt)});
initTheme();
</script>
</body>
</html>
