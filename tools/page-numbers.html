<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Add Page Numbers – PDFHub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="shared.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
</head><body>
<nav>
  <a class="logo" href="../index.html">PDFHub</a>
  <div class="nav-right">
    <a class="back" href="../index.html"><i class="fas fa-chevron-left"></i> All Tools</a>
    <button class="theme-toggle" id="themeToggle" title="Toggle theme"><i class="fas fa-moon"></i></button>
  </div>
</nav>
<div class="tool-wrap">
  <div class="tool-header"><div class="tool-icon" style="color:var(--a5)"><i class="fas fa-list-ol"></i></div><h1>Add Page Numbers</h1><p>Stamp page numbers on your PDF pages.</p></div>
  <div class="drop-area" id="drop" onclick="document.getElementById('fin').click()"><i class="fas fa-cloud-upload-alt"></i><div class="dl">Drop a PDF or click to upload</div></div>
  <input type="file" id="fin" accept=".pdf" hidden/>
  <div class="file-list" id="finfo"></div>
  <div class="options" id="opts" style="display:none">
    <div class="opt-row"><label>Position</label><select id="pos"><option value="bottom-center">Bottom Center</option><option value="bottom-right">Bottom Right</option><option value="bottom-left">Bottom Left</option><option value="top-center">Top Center</option><option value="top-right">Top Right</option></select></div>
    <div class="opt-row"><label>Format</label><select id="fmt"><option value="n">1, 2, 3…</option><option value="page-n">Page 1, Page 2…</option><option value="n-of-total">1 of 10, 2 of 10…</option></select></div>
    <div class="opt-row"><label>Start number from</label><input type="number" id="start" value="1" min="1"/></div>
    <div class="opt-row"><label>Font size</label><input type="number" id="fsize" value="11" min="6" max="36"/></div>
    <div class="opt-row"><label>Color</label><select id="color"><option value="black">Black</option><option value="gray">Gray</option><option value="white">White</option></select></div>
  </div>
  <div class="action-row">
    <button class="btn btn-primary" id="goBtn" disabled onclick="go()"><i class="fas fa-list-ol"></i> Add Numbers</button>
    <button class="btn btn-secondary" onclick="location.reload()"><i class="fas fa-redo"></i> Reset</button>
  </div>
  <div class="status" id="status"></div>
  <div class="progress" id="prog"><div class="progress-bar" id="pbar"></div></div>
</div>
<script>
let file=null,pageCount=0;
const drop=document.getElementById('drop'),fin=document.getElementById('fin');
fin.onchange=e=>{if(e.target.files[0])loadFile(e.target.files[0])};
drop.ondragover=e=>{e.preventDefault();drop.classList.add('over')};drop.ondragleave=()=>drop.classList.remove('over');
drop.ondrop=e=>{e.preventDefault();drop.classList.remove('over');const f=e.dataTransfer.files[0];if(f?.type==='application/pdf')loadFile(f)};
async function loadFile(f){file=f;const ab=await f.arrayBuffer();const doc=await PDFLib.PDFDocument.load(ab,{ignoreEncryption:true});pageCount=doc.getPageCount();document.getElementById('finfo').innerHTML=`<div class="file-item"><i class="fas fa-file-pdf"></i><span class="fn">${f.name}</span><span class="fs">${pageCount} pages</span></div>`;document.getElementById('opts').style.display='block';document.getElementById('goBtn').disabled=false;}
function showStatus(msg,type){const s=document.getElementById('status');s.textContent=msg;s.className='status show '+type}
const CLRS={black:[0,0,0],gray:[0.5,0.5,0.5],white:[1,1,1]};
async function go(){
  const btn=document.getElementById('goBtn');btn.disabled=true;document.getElementById('prog').classList.add('show');showStatus('Adding page numbers…','info');
  try{
    const ab=await file.arrayBuffer();const doc=await PDFLib.PDFDocument.load(ab,{ignoreEncryption:true});
    const font=await doc.embedFont(PDFLib.StandardFonts.Helvetica);
    const pos=document.getElementById('pos').value;const fmt=document.getElementById('fmt').value;
    const start=parseInt(document.getElementById('start').value)||1;
    const fsize=parseInt(document.getElementById('fsize').value)||11;
    const clr=PDFLib.rgb(...CLRS[document.getElementById('color').value]);
    const pages=doc.getPages();const total=pages.length;
    pages.forEach((p,i)=>{
      document.getElementById('pbar').style.width=((i+1)/total*90)+'%';
      const {width,height}=p.getSize();
      const n=start+i;
      let label;
      if(fmt==='page-n') label=`Page ${n}`;
      else if(fmt==='n-of-total') label=`${n} of ${total}`;
      else label=`${n}`;
      const tw=font.widthOfTextAtSize(label,fsize);
      let x,y;
      if(pos==='bottom-center'){x=(width-tw)/2;y=20;}
      else if(pos==='bottom-right'){x=width-tw-20;y=20;}
      else if(pos==='bottom-left'){x=20;y=20;}
      else if(pos==='top-center'){x=(width-tw)/2;y=height-30;}
      else{x=width-tw-20;y=height-30;}
      p.drawText(label,{x,y,size:fsize,font,color:clr});
    });
    document.getElementById('pbar').style.width='100%';
    const bytes=await doc.save();
    const blob=new Blob([bytes],{type:'application/pdf'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='numbered.pdf';a.click();
    showStatus('✓ Page numbers added! Download started.','success');
  }catch(e){showStatus('Error: '+e.message,'error')}
  btn.disabled=false;
}

// Theme Toggle
const themeToggle = document.getElementById('themeToggle');
const html = document.documentElement;

function initTheme() {
  const savedTheme = localStorage.getItem('theme') || 'dark';
  html.setAttribute('data-theme', savedTheme);
  updateThemeToggle(savedTheme);
}

function updateThemeToggle(theme) {
  if (theme === 'dark') {
    themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
  } else {
    themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
  }
}

themeToggle.addEventListener('click', function() {
  const currentTheme = html.getAttribute('data-theme');
  const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', newTheme);
  localStorage.setItem('theme', newTheme);
  updateThemeToggle(newTheme);
});

initTheme();
</script></body></html>
