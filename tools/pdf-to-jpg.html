<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>PDF to JPG – PDFHub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="shared.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head><body>
<nav><a class="logo" href="../index.html">PDFHub</a><a class="back" href="../index.html"><i class="fas fa-chevron-left"></i> All Tools</a></nav>
<div class="tool-wrap">
  <div class="tool-header"><div class="tool-icon" style="color:var(--a4)"><i class="fas fa-file-image"></i></div><h1>PDF to JPG</h1><p>Convert each page of a PDF into a JPG image.</p></div>
  <div class="drop-area" id="drop" onclick="document.getElementById('fin').click()"><i class="fas fa-cloud-upload-alt"></i><div class="dl">Drop a PDF or click to upload</div><div class="ds">Single PDF</div></div>
  <input type="file" id="fin" accept=".pdf" hidden/>
  <div class="file-list" id="finfo"></div>
  <div class="options" id="opts" style="display:none">
    <div class="opt-row"><label>Quality</label><select id="qual"><option value="2">High (2x resolution)</option><option value="1.5">Medium (1.5x)</option><option value="1">Standard (1x)</option></select></div>
    <div class="opt-row"><label>Format</label><select id="fmt"><option value="image/jpeg">JPG</option><option value="image/png">PNG</option></select></div>
    <div class="opt-row"><label>Pages (leave blank for all, e.g. 1-3,5)</label><input type="text" id="pgrange" placeholder="All pages"/></div>
  </div>
  <div class="preview-grid" id="preview"></div>
  <div class="action-row">
    <button class="btn btn-primary" id="goBtn" disabled onclick="go()"><i class="fas fa-image"></i> Convert to Images</button>
    <button class="btn btn-secondary" onclick="location.reload()"><i class="fas fa-redo"></i> Reset</button>
  </div>
  <div class="status" id="status"></div>
  <div class="progress" id="prog"><div class="progress-bar" id="pbar"></div></div>
</div>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
let file=null,pdfDoc=null;
const drop=document.getElementById('drop'),fin=document.getElementById('fin');
fin.onchange=e=>{if(e.target.files[0])loadFile(e.target.files[0])};
drop.ondragover=e=>{e.preventDefault();drop.classList.add('over')};drop.ondragleave=()=>drop.classList.remove('over');
drop.ondrop=e=>{e.preventDefault();drop.classList.remove('over');const f=e.dataTransfer.files[0];if(f?.type==='application/pdf')loadFile(f)};
async function loadFile(f){
  file=f;showStatus('Loading PDF…','info');
  const ab=await f.arrayBuffer();
  pdfDoc=await pdfjsLib.getDocument({data:ab}).promise;
  document.getElementById('finfo').innerHTML=`<div class="file-item"><i class="fas fa-file-pdf"></i><span class="fn">${f.name}</span><span class="fs">${pdfDoc.numPages} pages</span></div>`;
  document.getElementById('opts').style.display='block';document.getElementById('goBtn').disabled=false;showStatus('','');
}
function parsePages(str,max){if(!str.trim())return Array.from({length:max},(_,i)=>i+1);const set=new Set();str.split(',').forEach(r=>{r=r.trim();if(r.includes('-')){const[a,b]=r.split('-').map(Number);for(let i=a;i<=Math.min(b,max);i++)set.add(i);}else{const n=parseInt(r);if(n>=1&&n<=max)set.add(n);}});return[...set].sort((a,b)=>a-b);}
function showStatus(msg,type){const s=document.getElementById('status');s.textContent=msg;s.className='status '+(msg?'show ':'')+type}
async function go(){
  const btn=document.getElementById('goBtn');btn.disabled=true;document.getElementById('prog').classList.add('show');showStatus('Converting pages…','info');
  try{
    const scale=parseFloat(document.getElementById('qual').value);
    const fmt=document.getElementById('fmt').value;
    const ext=fmt==='image/png'?'png':'jpg';
    const pages=parsePages(document.getElementById('pgrange').value,pdfDoc.numPages);
    const canvas=document.createElement('canvas');const ctx=canvas.getContext('2d');
    for(let i=0;i<pages.length;i++){
      document.getElementById('pbar').style.width=((i+1)/pages.length*95)+'%';
      const page=await pdfDoc.getPage(pages[i]);
      const vp=page.getViewport({scale});
      canvas.width=vp.width;canvas.height=vp.height;
      await page.render({canvasContext:ctx,viewport:vp}).promise;
      await new Promise(res=>{canvas.toBlob(blob=>{const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`page-${pages[i]}.${ext}`;a.click();setTimeout(res,300);},fmt,0.92);});
    }
    document.getElementById('pbar').style.width='100%';showStatus(`✓ Exported ${pages.length} image(s)!`,'success');
  }catch(e){showStatus('Error: '+e.message,'error')}
  btn.disabled=false;
}
</script></body></html>
