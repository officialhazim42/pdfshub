<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Remove Pages – PDFHub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="shared.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
</head>
<body>
<nav><a class="logo" href="../index.html">PDFHub</a><a class="back" href="../index.html"><i class="fas fa-chevron-left"></i> All Tools</a></nav>
<div class="tool-wrap">
  <div class="tool-header">
    <div class="tool-icon" style="color:var(--accent)"><i class="fas fa-trash-alt"></i></div>
    <h1>Remove Pages</h1>
    <p>Delete specific pages from your PDF document.</p>
  </div>
  <div class="drop-area" id="drop" onclick="document.getElementById('fin').click()">
    <i class="fas fa-cloud-upload-alt"></i>
    <div class="dl">Drop a PDF here or click to upload</div>
    <div class="ds">Single PDF file</div>
  </div>
  <input type="file" id="fin" accept=".pdf" hidden/>
  <div class="file-list" id="finfo"></div>
  <div class="options" id="opts" style="display:none">
    <div class="opt-row">
      <label id="pgLabel">Pages to remove (e.g. 1, 3, 5-7)</label>
      <input type="text" id="pages" placeholder="1, 3, 5-7"/>
    </div>
  </div>
  <div class="action-row">
    <button class="btn btn-primary" id="goBtn" disabled onclick="go()"><i class="fas fa-trash-alt"></i> Remove Pages</button>
    <button class="btn btn-secondary" onclick="location.reload()"><i class="fas fa-redo"></i> Reset</button>
  </div>
  <div class="status" id="status"></div>
  <div class="progress" id="prog"><div class="progress-bar" id="pbar"></div></div>
</div>
<script>
let file=null,pageCount=0;
const drop=document.getElementById('drop'),fin=document.getElementById('fin');
fin.onchange=e=>{if(e.target.files[0])loadFile(e.target.files[0])};
drop.ondragover=e=>{e.preventDefault();drop.classList.add('over')};
drop.ondragleave=()=>drop.classList.remove('over');
drop.ondrop=e=>{e.preventDefault();drop.classList.remove('over');const f=e.dataTransfer.files[0];if(f?.type==='application/pdf')loadFile(f)};
async function loadFile(f){
  file=f;const ab=await f.arrayBuffer();
  const doc=await PDFLib.PDFDocument.load(ab,{ignoreEncryption:true});
  pageCount=doc.getPageCount();
  document.getElementById('finfo').innerHTML=`<div class="file-item"><i class="fas fa-file-pdf"></i><span class="fn">${f.name}</span><span class="fs">${pageCount} pages</span></div>`;
  document.getElementById('pgLabel').textContent=`Pages to remove (1-${pageCount}, e.g. 1, 3, 5-7)`;
  document.getElementById('opts').style.display='block';
  document.getElementById('goBtn').disabled=false;
}
function parsePages(str,max){
  const set=new Set();
  str.split(',').forEach(r=>{r=r.trim();if(r.includes('-')){const[a,b]=r.split('-').map(Number);for(let i=a;i<=Math.min(b,max);i++)set.add(i-1);}else{const n=parseInt(r);if(n>=1&&n<=max)set.add(n-1);}});
  return [...set].sort((a,b)=>a-b);
}
function showStatus(msg,type){const s=document.getElementById('status');s.textContent=msg;s.className='status show '+type}
async function go(){
  const btn=document.getElementById('goBtn');btn.disabled=true;
  const prog=document.getElementById('prog'),pbar=document.getElementById('pbar');
  prog.classList.add('show');pbar.style.width='30%';showStatus('Processing…','info');
  try{
    const toRemove=new Set(parsePages(document.getElementById('pages').value,pageCount));
    if(!toRemove.size){showStatus('Enter valid page numbers','error');btn.disabled=false;return;}
    const ab=await file.arrayBuffer();
    const src=await PDFLib.PDFDocument.load(ab,{ignoreEncryption:true});
    const out=await PDFLib.PDFDocument.create();
    const keep=[];for(let i=0;i<pageCount;i++)if(!toRemove.has(i))keep.push(i);
    if(!keep.length){showStatus('Cannot remove all pages!','error');btn.disabled=false;return;}
    const pages=await out.copyPages(src,keep);
    pages.forEach(p=>out.addPage(p));
    pbar.style.width='90%';
    const bytes=await out.save();
    download(bytes,'removed-pages.pdf');
    pbar.style.width='100%';
    showStatus(`✓ Removed ${toRemove.size} page(s). Download started.`,'success');
  }catch(e){showStatus('Error: '+e.message,'error')}
  btn.disabled=false;
}
function download(bytes,name){const blob=new Blob([bytes],{type:'application/pdf'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click()}
</script>
</body></html>
