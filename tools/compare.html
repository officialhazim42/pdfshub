<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Compare PDF – PDFHub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="shared.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.pdf-drop{border:2px dashed var(--border);border-radius:12px;padding:24px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;background:var(--s1)}
.pdf-drop:hover{border-color:var(--accent);background:rgba(124,106,255,.05)}
.pdf-drop i{font-size:1.5rem;color:var(--muted);display:block;margin-bottom:8px}
.pdf-drop .l{font-size:.85rem;font-weight:500}
.pdf-drop .s{font-size:.72rem;color:var(--muted)}
.compare-view{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
.compare-side h3{font-size:.82rem;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
.compare-side canvas{width:100%;border:1px solid var(--border);border-radius:8px}
.diff-badge{background:var(--a2);color:#fff;font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:5px;margin-left:8px}
#pgNav{display:flex;align-items:center;gap:10px;margin:10px 0;font-size:.85rem}
#pgNav button{background:var(--s2);border:1px solid var(--border);color:var(--text);padding:5px 12px;border-radius:7px;cursor:pointer}
</style>
</head><body>
<nav><a class="logo" href="../index.html">PDFHub</a><a class="back" href="../index.html"><i class="fas fa-chevron-left"></i> All Tools</a></nav>
<div class="tool-wrap" style="max-width:1000px">
  <div class="tool-header"><div class="tool-icon" style="color:#facc15"><i class="fas fa-not-equal"></i></div><h1>Compare PDF</h1><p>Upload two PDFs to visually compare pages side by side and highlight differences.</p></div>
  <div class="two-col">
    <div class="pdf-drop" id="drop1" onclick="document.getElementById('fin1').click()"><i class="fas fa-file-pdf"></i><div class="l">Original PDF</div><div class="s" id="name1">Click or drop</div></div>
    <div class="pdf-drop" id="drop2" onclick="document.getElementById('fin2').click()"><i class="fas fa-file-pdf"></i><div class="l">Modified PDF</div><div class="s" id="name2">Click or drop</div></div>
  </div>
  <input type="file" id="fin1" accept=".pdf" hidden/>
  <input type="file" id="fin2" accept=".pdf" hidden/>
  <div class="action-row" style="margin-top:14px">
    <button class="btn btn-primary" id="goBtn" disabled onclick="compare()"><i class="fas fa-not-equal"></i> Compare Pages</button>
  </div>
  <div class="status" id="status"></div>
  <div id="result" style="display:none">
    <div id="pgNav">
      <button onclick="changePage(-1)"><i class="fas fa-chevron-left"></i></button>
      <span id="pgInfo">Page 1 / 1</span>
      <button onclick="changePage(1)"><i class="fas fa-chevron-right"></i></button>
    </div>
    <div class="compare-view">
      <div class="compare-side"><h3>Original <span id="d1b" class="diff-badge" style="display:none">Diff</span></h3><canvas id="c1"></canvas></div>
      <div class="compare-side"><h3>Modified <span id="d2b" class="diff-badge" style="display:none">Diff</span></h3><canvas id="c2"></canvas></div>
    </div>
    <div id="diffInfo" style="font-size:.82rem;color:var(--muted);margin-top:10px"></div>
  </div>
</div>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
let docs=[null,null],curPage=1;
function setupDrop(n){
  const drop=document.getElementById('drop'+n),fin=document.getElementById('fin'+n);
  fin.onchange=e=>{if(e.target.files[0])loadFile(n,e.target.files[0])};
  drop.ondragover=e=>{e.preventDefault();drop.style.borderColor='var(--accent)'};
  drop.ondragleave=()=>drop.style.borderColor='';
  drop.ondrop=e=>{e.preventDefault();drop.style.borderColor='';const f=e.dataTransfer.files[0];if(f?.type==='application/pdf')loadFile(n,f)};
}
setupDrop(1);setupDrop(2);
async function loadFile(n,f){const ab=await f.arrayBuffer();docs[n-1]=await pdfjsLib.getDocument({data:ab}).promise;document.getElementById('name'+n).textContent=f.name;if(docs[0]&&docs[1])document.getElementById('goBtn').disabled=false;}
function showStatus(msg,type){const s=document.getElementById('status');s.textContent=msg;s.className='status show '+type}
async function compare(){document.getElementById('result').style.display='block';renderCompare(1);}
let maxPages=1;
async function renderCompare(n){
  curPage=n;maxPages=Math.max(docs[0].numPages,docs[1].numPages);document.getElementById('pgInfo').textContent=`Page ${n} / ${maxPages}`;
  const scale=1.1;
  async function renderTo(doc,canvasId){
    if(n>doc.numPages){const cv=document.getElementById(canvasId);const ctx=cv.getContext('2d');ctx.clearRect(0,0,cv.width,cv.height);ctx.fillStyle='#888';ctx.font='14px sans-serif';ctx.fillText('(no page)',10,30);return null;}
    const page=await doc.getPage(n);const vp=page.getViewport({scale});
    const cv=document.getElementById(canvasId);cv.width=vp.width;cv.height=vp.height;
    await page.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
    return cv;
  }
  const [cv1,cv2]=await Promise.all([renderTo(docs[0],'c1'),renderTo(docs[1],'c2')]);
  if(cv1&&cv2)highlightDiffs(cv1,cv2);
}
function highlightDiffs(c1,c2){
  const w=Math.min(c1.width,c2.width),h=Math.min(c1.height,c2.height);
  const d1=c1.getContext('2d').getImageData(0,0,w,h).data;
  const d2=c2.getContext('2d').getImageData(0,0,w,h).data;
  const ov1=document.createElement('canvas');ov1.width=c1.width;ov1.height=c1.height;const oc1=ov1.getContext('2d');oc1.drawImage(c1,0,0);
  const ov2=document.createElement('canvas');ov2.width=c2.width;ov2.height=c2.height;const oc2=ov2.getContext('2d');oc2.drawImage(c2,0,0);
  let diffPx=0;
  for(let i=0;i<d1.length;i+=4){
    const dr=Math.abs(d1[i]-d2[i]),dg=Math.abs(d1[i+1]-d2[i+1]),db=Math.abs(d1[i+2]-d2[i+2]);
    if(dr+dg+db>60){diffPx++;const x=(i/4)%w,y=Math.floor((i/4)/w);oc1.fillStyle='rgba(255,80,80,0.45)';oc1.fillRect(x,y,1,1);oc2.fillStyle='rgba(255,80,80,0.45)';oc2.fillRect(x,y,1,1);}
  }
  c1.getContext('2d').drawImage(ov1,0,0);c2.getContext('2d').drawImage(ov2,0,0);
  const hasDiff=diffPx>100;
  document.getElementById('d1b').style.display=hasDiff?'':'none';
  document.getElementById('d2b').style.display=hasDiff?'':'none';
  document.getElementById('diffInfo').textContent=hasDiff?`⚠ ${diffPx.toLocaleString()} differing pixels detected on this page.`:'✓ Pages appear identical.';
}
function changePage(d){const n=curPage+d;if(n>=1&&n<=maxPages)renderCompare(n);}
</script></body></html>
