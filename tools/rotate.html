<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Rotate PDF – PDFHub</title><link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/><link rel="stylesheet" href="shared.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<body>
<nav>
  <a class="logo" href="../index.html">PDFHub</a>
  <div class="nav-right">
    <a class="back" href="../index.html"><i class="fas fa-chevron-left"></i> All Tools</a>
    <button class="theme-toggle" id="themeToggle" title="Toggle theme"><i class="fas fa-moon"></i></button>
  </div>
</nav>
<div class="tool-wrap">
  <div class="tool-header"><div class="tool-icon" style="color:var(--a5)"><i class="fas fa-redo"></i></div><h1>Rotate PDF</h1><p>Rotate all pages or specific pages of your PDF.</p></div>
  <div class="drop-area" id="drop" onclick="document.getElementById('fin').click()"><i class="fas fa-cloud-upload-alt"></i><div class="dl">Drop a PDF or click to upload</div><div class="ds">Single PDF</div></div>
  <input type="file" id="fin" accept=".pdf" hidden/>
  <div class="file-list" id="finfo"></div>
  <div class="options" id="opts" style="display:none">
    <div class="opt-row"><label>Rotation</label>
      <select id="deg"><option value="90">90° Clockwise</option><option value="180">180°</option><option value="270">90° Counter-clockwise</option></select>
    </div>
    <div class="opt-row"><label>Apply to</label>
      <select id="which"><option value="all">All pages</option><option value="even">Even pages</option><option value="odd">Odd pages</option><option value="custom">Custom pages</option></select>
    </div>
    <div class="opt-row" id="customRow" style="display:none"><label>Page numbers (e.g. 1,3,5-7)</label><input type="text" id="custPages" placeholder="1, 3, 5-7"/></div>
  </div>
  <div class="action-row">
    <button class="btn btn-primary" id="goBtn" disabled onclick="go()"><i class="fas fa-redo"></i> Rotate PDF</button>
    <button class="btn btn-secondary" onclick="location.reload()"><i class="fas fa-redo"></i> Reset</button>
  </div>
  <div class="status" id="status"></div>
  <div class="progress" id="prog"><div class="progress-bar" id="pbar"></div></div>
</div>
<script>
let file=null,pageCount=0;
document.getElementById('which').onchange=function(){document.getElementById('customRow').style.display=this.value==='custom'?'':'none'};
const drop=document.getElementById('drop'),fin=document.getElementById('fin');
fin.onchange=e=>{if(e.target.files[0])loadFile(e.target.files[0])};
drop.ondragover=e=>{e.preventDefault();drop.classList.add('over')};drop.ondragleave=()=>drop.classList.remove('over');
drop.ondrop=e=>{e.preventDefault();drop.classList.remove('over');const f=e.dataTransfer.files[0];if(f?.type==='application/pdf')loadFile(f)};
async function loadFile(f){file=f;const ab=await f.arrayBuffer();const doc=await PDFLib.PDFDocument.load(ab,{ignoreEncryption:true});pageCount=doc.getPageCount();document.getElementById('finfo').innerHTML=`<div class="file-item"><i class="fas fa-file-pdf"></i><span class="fn">${f.name}</span><span class="fs">${pageCount} pages</span></div>`;document.getElementById('opts').style.display='block';document.getElementById('goBtn').disabled=false;}
function parsePages(str,max){const set=new Set();str.split(',').forEach(r=>{r=r.trim();if(r.includes('-')){const[a,b]=r.split('-').map(Number);for(let i=a;i<=Math.min(b,max);i++)set.add(i-1);}else{const n=parseInt(r);if(n>=1&&n<=max)set.add(n-1);}});return set;}
function showStatus(msg,type){const s=document.getElementById('status');s.textContent=msg;s.className='status show '+type}
async function go(){
  const btn=document.getElementById('goBtn');btn.disabled=true;document.getElementById('prog').classList.add('show');document.getElementById('pbar').style.width='20%';showStatus('Rotating…','info');
  try{
    const deg=parseInt(document.getElementById('deg').value);
    const which=document.getElementById('which').value;
    const ab=await file.arrayBuffer();const doc=await PDFLib.PDFDocument.load(ab,{ignoreEncryption:true});
    const pages=doc.getPages();
    let targets;
    if(which==='all') targets=new Set(pages.map((_,i)=>i));
    else if(which==='even') targets=new Set(pages.map((_,i)=>i).filter(i=>(i+1)%2===0));
    else if(which==='odd') targets=new Set(pages.map((_,i)=>i).filter(i=>(i+1)%2===1));
    else targets=parsePages(document.getElementById('custPages').value,pageCount);
    targets.forEach(i=>{if(i<pages.length){const p=pages[i];p.setRotation(PDFLib.degrees((p.getRotation().angle+deg)%360));}});
    document.getElementById('pbar').style.width='90%';const bytes=await doc.save();
    const blob=new Blob([bytes],{type:'application/pdf'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='rotated.pdf';a.click();
    document.getElementById('pbar').style.width='100%';showStatus('✓ Rotated! Download started.','success');
  }catch(e){showStatus('Error: '+e.message,'error')}
  btn.disabled=false;
}

// Theme Toggle
const themeToggle = document.getElementById('themeToggle');
const html = document.documentElement;

function initTheme() {
  const savedTheme = localStorage.getItem('theme') || 'dark';
  html.setAttribute('data-theme', savedTheme);
  updateThemeToggle(savedTheme);
}

function updateThemeToggle(theme) {
  if (theme === 'dark') {
    themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
  } else {
    themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
  }
}

themeToggle.addEventListener('click', function() {
  const currentTheme = html.getAttribute('data-theme');
  const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', newTheme);
  localStorage.setItem('theme', newTheme);
  updateThemeToggle(newTheme);
});

initTheme();
</script></body></html>
