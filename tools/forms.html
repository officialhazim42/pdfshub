<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>PDF Forms – PDFHub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="shared.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
.field-item{display:flex;align-items:center;gap:10px;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.field-item label{font-size:.82rem;font-weight:600;min-width:140px;color:var(--muted)}
.field-item input,.field-item select,.field-item textarea{flex:1;background:var(--s1);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:7px;font-size:.82rem;font-family:'DM Sans',sans-serif;outline:none}
.field-item input:focus,.field-item select:focus,.field-item textarea:focus{border-color:var(--accent)}
.field-type-badge{font-size:.65rem;background:rgba(124,106,255,.15);color:var(--accent);border:1px solid rgba(124,106,255,.25);padding:2px 7px;border-radius:5px;white-space:nowrap}
</style>
</head><body>
<nav><a class="logo" href="../index.html">PDFHub</a><a class="back" href="../index.html"><i class="fas fa-chevron-left"></i> All Tools</a></nav>
<div class="tool-wrap">
  <div class="tool-header"><div class="tool-icon" style="color:var(--a5)"><i class="fas fa-wpforms"></i></div><h1>PDF Forms</h1><p>Upload a PDF with form fields and fill them directly in the browser.</p></div>
  <div class="drop-area" id="drop" onclick="document.getElementById('fin').click()"><i class="fas fa-cloud-upload-alt"></i><div class="dl">Drop a fillable PDF or click to upload</div></div>
  <input type="file" id="fin" accept=".pdf" hidden/>
  <div class="file-list" id="finfo"></div>
  <div id="formFields" style="display:none">
    <div style="margin:16px 0 10px;font-size:.85rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Form Fields</div>
    <div id="fieldsContainer"></div>
  </div>
  <div class="action-row">
    <button class="btn btn-primary" id="goBtn" disabled onclick="go()"><i class="fas fa-save"></i> Save Filled PDF</button>
    <button class="btn btn-secondary" onclick="location.reload()"><i class="fas fa-redo"></i> Reset</button>
  </div>
  <div class="status" id="status"></div>
  <div class="progress" id="prog"><div class="progress-bar" id="pbar"></div></div>
</div>
<script>
let file=null,pdfDoc=null,fields=[];
const drop=document.getElementById('drop'),fin=document.getElementById('fin');
fin.onchange=e=>{if(e.target.files[0])loadFile(e.target.files[0])};
drop.ondragover=e=>{e.preventDefault();drop.classList.add('over')};drop.ondragleave=()=>drop.classList.remove('over');
drop.ondrop=e=>{e.preventDefault();drop.classList.remove('over');const f=e.dataTransfer.files[0];if(f?.type==='application/pdf')loadFile(f)};
function showStatus(msg,type){const s=document.getElementById('status');s.textContent=msg;s.className='status show '+type}
async function loadFile(f){
  file=f;showStatus('Loading form fields…','info');
  try{
    const ab=await f.arrayBuffer();pdfDoc=await PDFLib.PDFDocument.load(ab,{ignoreEncryption:true});
    const form=pdfDoc.getForm();fields=form.getFields();
    document.getElementById('finfo').innerHTML=`<div class="file-item"><i class="fas fa-file-pdf"></i><span class="fn">${f.name}</span><span class="fs">${fields.length} field(s) found</span></div>`;
    if(fields.length===0){showStatus('No fillable fields found in this PDF.','error');return;}
    const container=document.getElementById('fieldsContainer');container.innerHTML='';
    fields.forEach((field,i)=>{
      const type=field.constructor.name.replace('PDF','').replace('Field','');
      const d=document.createElement('div');d.className='field-item';
      let input='';
      if(field instanceof PDFLib.PDFTextField){input=`<input type="text" id="f${i}" value="${field.getText()||''}" placeholder="Enter value…"/>`;}
      else if(field instanceof PDFLib.PDFCheckBox){input=`<input type="checkbox" id="f${i}" ${field.isChecked()?'checked':''} style="width:18px;height:18px;flex:0"/>`;}
      else if(field instanceof PDFLib.PDFDropdown){const opts=field.getOptions();input=`<select id="f${i}">${opts.map(o=>`<option ${field.getSelected().includes(o)?'selected':''}>${o}</option>`).join('')}</select>`;}
      else{input=`<input type="text" id="f${i}" placeholder="(${type})"/>`;}
      d.innerHTML=`<label>${field.getName()}</label><span class="field-type-badge">${type}</span>${input}`;
      container.appendChild(d);
    });
    document.getElementById('formFields').style.display='block';document.getElementById('goBtn').disabled=false;showStatus('','');
  }catch(e){showStatus('Error loading form: '+e.message,'error')}
}
async function go(){
  const btn=document.getElementById('goBtn');btn.disabled=true;document.getElementById('prog').classList.add('show');document.getElementById('pbar').style.width='20%';showStatus('Filling form…','info');
  try{
    const ab=await file.arrayBuffer();const doc=await PDFLib.PDFDocument.load(ab,{ignoreEncryption:true});
    const form=doc.getForm();const flds=form.getFields();
    flds.forEach((field,i)=>{
      const el=document.getElementById('f'+i);if(!el)return;
      try{
        if(field instanceof PDFLib.PDFTextField)field.setText(el.value);
        else if(field instanceof PDFLib.PDFCheckBox){if(el.checked)field.check();else field.uncheck();}
        else if(field instanceof PDFLib.PDFDropdown)field.select(el.value);
      }catch{}
    });
    form.flatten();// embed values permanently
    document.getElementById('pbar').style.width='90%';const bytes=await doc.save();
    const blob=new Blob([bytes],{type:'application/pdf'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='filled-form.pdf';a.click();
    document.getElementById('pbar').style.width='100%';showStatus('✓ Form filled and saved!','success');
  }catch(e){showStatus('Error: '+e.message,'error')}
  btn.disabled=false;
}
</script></body></html>
