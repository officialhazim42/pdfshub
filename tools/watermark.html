<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Watermark PDF – PDFHub</title><link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/><link rel="stylesheet" href="shared.css"/><script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js">
<body>
<nav>
  <a class="logo" href="../index.html">PDFHub</a>
  <div class="nav-right">
    <a class="back" href="../index.html"><i class="fas fa-chevron-left"></i> All Tools</a>
    <button class="theme-toggle" id="themeToggle" title="Toggle theme"><i class="fas fa-moon"></i></button>
  </div>
</nav>
<div class="tool-wrap">
  <div class="tool-header"><div class="tool-icon" style="color:var(--a5)"><i class="fas fa-stamp"></i></div><h1>Add Watermark</h1><p>Stamp text across every page of your PDF.</p></div>
  <div class="drop-area" id="drop" onclick="document.getElementById('fin').click()"><i class="fas fa-cloud-upload-alt"></i><div class="dl">Drop a PDF or click to upload</div></div>
  <input type="file" id="fin" accept=".pdf" hidden/>
  <div class="file-list" id="finfo"></div>
  <div class="options" id="opts" style="display:none">
    <div class="opt-row"><label>Watermark text</label><input type="text" id="wtext" placeholder="e.g. CONFIDENTIAL, DRAFT…" value="CONFIDENTIAL"/></div>
    <div class="opt-row"><label>Font size</label><input type="number" id="fsize" value="60" min="12" max="200"/></div>
    <div class="opt-row"><label>Opacity (0-100)</label><input type="range" id="opacity" min="5" max="80" value="25" oninput="document.getElementById('opval').textContent=this.value+'%'"/><span id="opval" style="font-size:.8rem;color:var(--muted)">25%</span></div>
    <div class="opt-row"><label>Color</label><select id="color"><option value="gray">Gray</option><option value="red">Red</option><option value="blue">Blue</option><option value="green">Green</option></select></div>
    <div class="opt-row"><label>Angle</label><select id="angle"><option value="45">45° diagonal</option><option value="0">Horizontal</option><option value="-45">-45° diagonal</option></select></div>
  </div>
  <div class="action-row">
    <button class="btn btn-primary" id="goBtn" disabled onclick="go()"><i class="fas fa-stamp"></i> Add Watermark</button>
    <button class="btn btn-secondary" onclick="location.reload()"><i class="fas fa-redo"></i> Reset</button>
  </div>
  <div class="status" id="status"></div>
  <div class="progress" id="prog"><div class="progress-bar" id="pbar"></div></div>
</div>
<script>
let file=null;
const drop=document.getElementById('drop'),fin=document.getElementById('fin');
fin.onchange=e=>{if(e.target.files[0])loadFile(e.target.files[0])};
drop.ondragover=e=>{e.preventDefault();drop.classList.add('over')};drop.ondragleave=()=>drop.classList.remove('over');
drop.ondrop=e=>{e.preventDefault();drop.classList.remove('over');const f=e.dataTransfer.files[0];if(f?.type==='application/pdf')loadFile(f)};
function loadFile(f){file=f;document.getElementById('finfo').innerHTML=`<div class="file-item"><i class="fas fa-file-pdf"></i><span class="fn">${f.name}</span><span class="fs">${(f.size/1024/1024).toFixed(2)} MB</span></div>`;document.getElementById('opts').style.display='block';document.getElementById('goBtn').disabled=false;}
function showStatus(msg,type){const s=document.getElementById('status');s.textContent=msg;s.className='status show '+type}
const COLORS={gray:[0.5,0.5,0.5],red:[0.8,0.1,0.1],blue:[0.1,0.1,0.8],green:[0.1,0.6,0.1]};
async function go(){
  const text=document.getElementById('wtext').value.trim();
  if(!text){showStatus('Enter watermark text','error');return;}
  const btn=document.getElementById('goBtn');btn.disabled=true;document.getElementById('prog').classList.add('show');document.getElementById('pbar').style.width='20%';showStatus('Adding watermark…','info');
  try{
    const ab=await file.arrayBuffer();const doc=await PDFLib.PDFDocument.load(ab,{ignoreEncryption:true});
    const font=await doc.embedFont(PDFLib.StandardFonts.HelveticaBold);
    const opacity=parseInt(document.getElementById('opacity').value)/100;
    const fsize=parseInt(document.getElementById('fsize').value);
    const clr=COLORS[document.getElementById('color').value];
    const angle=parseInt(document.getElementById('angle').value)*Math.PI/180;
    const pages=doc.getPages();
    pages.forEach((p,i)=>{
      document.getElementById('pbar').style.width=(20+(i/pages.length*70))+'%';
      const {width,height}=p.getSize();
      p.drawText(text,{x:width/2,y:height/2,size:fsize,font,color:PDFLib.rgb(...clr),opacity,rotate:PDFLib.degrees(parseInt(document.getElementById('angle').value)),xSkew:PDFLib.degrees(0),ySkew:PDFLib.degrees(0),blendMode:PDFLib.BlendMode.Multiply});
    });
    const bytes=await doc.save();
    const blob=new Blob([bytes],{type:'application/pdf'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='watermarked.pdf';a.click();
    document.getElementById('pbar').style.width='100%';showStatus('✓ Watermark added! Download started.','success');
  }catch(e){showStatus('Error: '+e.message,'error')}
  btn.disabled=false;
}

// Theme Toggle
const themeToggle = document.getElementById('themeToggle');
const html = document.documentElement;

function initTheme() {
  const savedTheme = localStorage.getItem('theme') || 'dark';
  html.setAttribute('data-theme', savedTheme);
  updateThemeToggle(savedTheme);
}

function updateThemeToggle(theme) {
  if (theme === 'dark') {
    themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
  } else {
    themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
  }
}

themeToggle.addEventListener('click', function() {
  const currentTheme = html.getAttribute('data-theme');
  const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', newTheme);
  localStorage.setItem('theme', newTheme);
  updateThemeToggle(newTheme);
});

initTheme();
</script></body></html>
