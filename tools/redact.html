<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Redact PDF – PDFHub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="shared.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
#canvasWrap{position:relative;display:inline-block;cursor:crosshair}
#pdfCanvas,#redactCanvas{border:1px solid var(--border);border-radius:8px;max-width:100%}
#redactCanvas{position:absolute;top:0;left:0;border-radius:8px}
#pgNav{display:flex;align-items:center;gap:10px;margin:10px 0;font-size:.85rem}
#pgNav button{background:var(--s2);border:1px solid var(--border);color:var(--text);padding:5px 12px;border-radius:7px;cursor:pointer}
</style>
</head><body>
<nav>
  <a class="logo" href="../index.html">PDFHub</a>
  <div class="nav-right">
    <a class="back" href="../index.html"><i class="fas fa-chevron-left"></i> All Tools</a>
    <button class="theme-toggle" id="themeToggle" title="Toggle theme"><i class="fas fa-moon"></i></button>
  </div>
</nav>
<div class="tool-wrap" style="max-width:900px">
  <div class="tool-header"><div class="tool-icon" style="color:#facc15"><i class="fas fa-eraser"></i></div><h1>Redact PDF</h1><p>Draw black boxes over sensitive content to permanently hide it.</p></div>
  <div class="drop-area" id="drop" onclick="document.getElementById('fin').click()"><i class="fas fa-cloud-upload-alt"></i><div class="dl">Drop a PDF or click to upload</div></div>
  <input type="file" id="fin" accept=".pdf" hidden/>
  <div id="editor" style="display:none">
    <div style="padding:10px 14px;background:rgba(250,204,21,.08);border:1px solid rgba(250,204,21,.2);border-radius:10px;font-size:.8rem;color:#facc15;margin-bottom:14px"><i class="fas fa-exclamation-triangle"></i> Draw rectangles over text to redact. Black boxes will be permanently applied.</div>
    <div id="pgNav">
      <button onclick="changePage(-1)"><i class="fas fa-chevron-left"></i></button>
      <span id="pgInfo">Page 1 of 1</span>
      <button onclick="changePage(1)"><i class="fas fa-chevron-right"></i></button>
    </div>
    <div id="canvasWrap">
      <canvas id="pdfCanvas"></canvas>
      <canvas id="redactCanvas"></canvas>
    </div>
    <div class="action-row" style="margin-top:14px">
      <button class="btn btn-primary" onclick="saveRedacted()"><i class="fas fa-download"></i> Save Redacted PDF</button>
      <button class="btn btn-secondary" onclick="clearPage()"><i class="fas fa-trash"></i> Clear Page</button>
      <button class="btn btn-secondary" onclick="location.reload()"><i class="fas fa-redo"></i> Reset</button>
    </div>
    <div class="status" id="status"></div>
  </div>
</div>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
let file=null,pdfJsDoc=null,curPage=1,drawing=false,startX,startY,redactions={};
const drop=document.getElementById('drop'),fin=document.getElementById('fin');
fin.onchange=e=>{if(e.target.files[0])loadFile(e.target.files[0])};
drop.ondragover=e=>{e.preventDefault();drop.classList.add('over')};drop.ondragleave=()=>drop.classList.remove('over');
drop.ondrop=e=>{e.preventDefault();drop.classList.remove('over');const f=e.dataTransfer.files[0];if(f?.type==='application/pdf')loadFile(f)};
async function loadFile(f){file=f;const ab=await f.arrayBuffer();pdfJsDoc=await pdfjsLib.getDocument({data:ab}).promise;document.getElementById('editor').style.display='block';drop.style.display='none';renderPage(1);}
const pdfC=document.getElementById('pdfCanvas'),pdfCtx=pdfC.getContext('2d');
const rc=document.getElementById('redactCanvas'),rCtx=rc.getContext('2d');
let viewport=null;
async function renderPage(n){curPage=n;document.getElementById('pgInfo').textContent=`Page ${n} of ${pdfJsDoc.numPages}`;const page=await pdfJsDoc.getPage(n);viewport=page.getViewport({scale:1.3});pdfC.width=rc.width=viewport.width;pdfC.height=rc.height=viewport.height;await page.render({canvasContext:pdfCtx,viewport}).promise;redrawRedactions();}
function changePage(d){const n=curPage+d;if(n>=1&&n<=pdfJsDoc.numPages)renderPage(n);}
function getPos(e){const r=rc.getBoundingClientRect();return{x:(e.clientX-r.left)*(rc.width/r.width),y:(e.clientY-r.top)*(rc.height/r.height)};}
rc.onmousedown=e=>{drawing=true;const p=getPos(e);startX=p.x;startY=p.y;};
rc.onmousemove=e=>{if(!drawing)return;const p=getPos(e);redrawRedactions();rCtx.fillStyle='#000';rCtx.fillRect(startX,startY,p.x-startX,p.y-startY);};
rc.onmouseup=e=>{if(!drawing)return;drawing=false;const p=getPos(e);if(!redactions[curPage])redactions[curPage]=[];redactions[curPage].push({x:startX,y:startY,w:p.x-startX,h:p.y-startY});redrawRedactions();};
function redrawRedactions(){rCtx.clearRect(0,0,rc.width,rc.height);rCtx.fillStyle='#000';(redactions[curPage]||[]).forEach(r=>rCtx.fillRect(r.x,r.y,r.w,r.h));}
function clearPage(){redactions[curPage]=[];redrawRedactions();}
function showStatus(msg,type){const s=document.getElementById('status');s.textContent=msg;s.className='status show '+type}
async function saveRedacted(){
  showStatus('Applying redactions…','info');
  try{
    const ab=await file.arrayBuffer();const doc=await PDFLib.PDFDocument.load(ab,{ignoreEncryption:true});
    const scale=1/1.3;
    for(const [pg,rects] of Object.entries(redactions)){
      if(!rects.length)continue;
      const page=doc.getPage(parseInt(pg)-1);const {height}=page.getSize();
      rects.forEach(r=>{page.drawRectangle({x:r.x*scale,y:height-(r.y+r.h)*scale,width:Math.abs(r.w)*scale,height:Math.abs(r.h)*scale,color:PDFLib.rgb(0,0,0)});});
    }
    const bytes=await doc.save();const blob=new Blob([bytes],{type:'application/pdf'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='redacted.pdf';a.click();
    showStatus('✓ Redacted! Download started.','success');
  }catch(e){showStatus('Error: '+e.message,'error')}
}

// Theme Toggle
const themeToggle = document.getElementById('themeToggle');
const html = document.documentElement;

function initTheme() {
  const savedTheme = localStorage.getItem('theme') || 'dark';
  html.setAttribute('data-theme', savedTheme);
  updateThemeToggle(savedTheme);
}

function updateThemeToggle(theme) {
  if (theme === 'dark') {
    themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
  } else {
    themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
  }
}

themeToggle.addEventListener('click', function() {
  const currentTheme = html.getAttribute('data-theme');
  const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', newTheme);
  localStorage.setItem('theme', newTheme);
  updateThemeToggle(newTheme);
});

initTheme();
</script></body></html>
