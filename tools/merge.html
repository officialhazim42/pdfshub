<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Merge PDF – PDFHub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="shared.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
</head>
<body>
<nav>
  <a class="logo" href="../index.html">PDFHub</a>
  <div class="nav-right">
    <a class="back" href="../index.html"><i class="fas fa-chevron-left"></i> All Tools</a>
    <button class="theme-toggle" id="themeToggle" title="Toggle theme"><i class="fas fa-moon"></i></button>
  </div>
</nav>
<div class="tool-wrap">
  <div class="tool-header">
    <div class="tool-icon" style="color:var(--accent)"><i class="fas fa-object-group"></i></div>
    <h1>Merge PDF</h1>
    <p>Combine multiple PDF files into one single document. Drag to reorder.</p>
  </div>
  <div class="drop-area" id="drop" onclick="document.getElementById('fin').click()">
    <i class="fas fa-cloud-upload-alt"></i>
    <div class="dl">Drop PDFs here or click to upload</div>
    <div class="ds">Multiple files supported · PDF only</div>
  </div>
  <input type="file" id="fin" accept=".pdf" multiple hidden/>
  <div class="file-list" id="flist"></div>
  <div class="action-row">
    <button class="btn btn-primary" id="mergeBtn" disabled onclick="mergePDFs()"><i class="fas fa-object-group"></i> Merge PDFs</button>
    <button class="btn btn-secondary" onclick="clearAll()"><i class="fas fa-trash"></i> Clear</button>
  </div>
  <div class="status" id="status"></div>
  <div class="progress" id="prog"><div class="progress-bar" id="pbar"></div></div>
</div>
<script>
let files=[];
const drop=document.getElementById('drop'),fin=document.getElementById('fin'),flist=document.getElementById('flist'),btn=document.getElementById('mergeBtn'),stat=document.getElementById('status'),prog=document.getElementById('prog'),pbar=document.getElementById('pbar');
fin.onchange=e=>{addFiles([...e.target.files]);fin.value=''};
drop.ondragover=e=>{e.preventDefault();drop.classList.add('over')};
drop.ondragleave=()=>drop.classList.remove('over');
drop.ondrop=e=>{e.preventDefault();drop.classList.remove('over');addFiles([...e.dataTransfer.files].filter(f=>f.type==='application/pdf'))};
function addFiles(newFiles){files=[...files,...newFiles];render()}
function render(){
  flist.innerHTML='';
  files.forEach((f,i)=>{
    const d=document.createElement('div');d.className='file-item';
    d.innerHTML=`<i class="fas fa-file-pdf"></i><span class="fn">${f.name}</span><span class="fs">${(f.size/1024/1024).toFixed(2)} MB</span><button class="rm" onclick="remove(${i})"><i class="fas fa-times"></i></button>`;
    flist.appendChild(d);
  });
  btn.disabled=files.length<2;
}
function remove(i){files.splice(i,1);render()}
function clearAll(){files=[];render();showStatus('','');prog.classList.remove('show')}
function showStatus(msg,type){stat.textContent=msg;stat.className='status show '+type}
async function mergePDFs(){
  btn.disabled=true;showStatus('Merging PDFs…','info');prog.classList.add('show');pbar.style.width='10%';
  try{
    const merged=await PDFLib.PDFDocument.create();
    for(let i=0;i<files.length;i++){
      pbar.style.width=((i+1)/files.length*85+10)+'%';
      const ab=await files[i].arrayBuffer();
      const doc=await PDFLib.PDFDocument.load(ab,{ignoreEncryption:true});
      const pages=await merged.copyPages(doc,doc.getPageIndices());
      pages.forEach(p=>merged.addPage(p));
    }
    pbar.style.width='100%';
    const bytes=await merged.save();
    download(bytes,'merged.pdf');
    showStatus('✓ Merged successfully! Download started.','success');
  }catch(e){showStatus('Error: '+e.message,'error')}
  btn.disabled=false;
}
function download(bytes,name){
  const blob=new Blob([bytes],{type:'application/pdf'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();
}
// Theme Toggle
const themeToggle = document.getElementById('themeToggle');
const html = document.documentElement;

function initTheme() {
  const savedTheme = localStorage.getItem('theme') || 'dark';
  html.setAttribute('data-theme', savedTheme);
  updateThemeToggle(savedTheme);
}

function updateThemeToggle(theme) {
  if (theme === 'dark') {
    themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
  } else {
    themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
  }
}

themeToggle.addEventListener('click', function() {
  const currentTheme = html.getAttribute('data-theme');
  const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', newTheme);
  localStorage.setItem('theme', newTheme);
  updateThemeToggle(newTheme);
});

initTheme();
</script>
</body></html>
