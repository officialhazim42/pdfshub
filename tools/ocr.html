<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>OCR PDF – PDFHub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="shared.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>#ocrResult{background:var(--s2);border:1px solid var(--border);border-radius:12px;padding:16px;font-size:.85rem;line-height:1.7;white-space:pre-wrap;max-height:400px;overflow-y:auto;display:none}</style>
</head><body>
<nav>
  <a class="logo" href="../index.html">PDFHub</a>
  <div class="nav-right">
    <a class="back" href="../index.html"><i class="fas fa-chevron-left"></i> All Tools</a>
    <button class="theme-toggle" id="themeToggle" title="Toggle theme"><i class="fas fa-moon"></i></button>
  </div>
</nav>
<div class="tool-wrap">
  <div class="tool-header"><div class="tool-icon" style="color:var(--a3)"><i class="fas fa-spell-check"></i></div><h1>OCR PDF</h1><p>Extract text from scanned PDFs using browser-based OCR (Tesseract.js). Also copies text to clipboard.</p></div>
  <div class="drop-area" id="drop" onclick="document.getElementById('fin').click()"><i class="fas fa-cloud-upload-alt"></i><div class="dl">Drop a scanned PDF or click to upload</div></div>
  <input type="file" id="fin" accept=".pdf" hidden/>
  <div class="file-list" id="finfo"></div>
  <div class="options" id="opts" style="display:none">
    <div class="opt-row"><label>Language</label><select id="lang"><option value="eng">English</option><option value="fra">French</option><option value="deu">German</option><option value="spa">Spanish</option><option value="ara">Arabic</option><option value="chi_sim">Chinese (Simplified)</option><option value="hin">Hindi</option></select></div>
    <div class="opt-row"><label>Pages (blank = all)</label><input type="text" id="pgrange" placeholder="e.g. 1-3"/></div>
  </div>
  <div class="action-row">
    <button class="btn btn-primary" id="goBtn" disabled onclick="go()"><i class="fas fa-spell-check"></i> Extract Text</button>
    <button class="btn btn-secondary" onclick="location.reload()"><i class="fas fa-redo"></i> Reset</button>
  </div>
  <div class="status" id="status"></div>
  <div class="progress" id="prog"><div class="progress-bar" id="pbar"></div></div>
  <div id="ocrResult"></div>
  <div class="action-row" id="copyRow" style="display:none">
    <button class="btn btn-secondary" onclick="copyText()"><i class="fas fa-copy"></i> Copy Text</button>
    <button class="btn btn-secondary" onclick="downloadTxt()"><i class="fas fa-download"></i> Download .txt</button>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
let file=null,extractedText='';
const drop=document.getElementById('drop'),fin=document.getElementById('fin');
fin.onchange=e=>{if(e.target.files[0])loadFile(e.target.files[0])};
drop.ondragover=e=>{e.preventDefault();drop.classList.add('over')};drop.ondragleave=()=>drop.classList.remove('over');
drop.ondrop=e=>{e.preventDefault();drop.classList.remove('over');const f=e.dataTransfer.files[0];if(f?.type==='application/pdf')loadFile(f)};
async function loadFile(f){file=f;const ab=await f.arrayBuffer();const doc=await pdfjsLib.getDocument({data:ab}).promise;document.getElementById('finfo').innerHTML=`<div class="file-item"><i class="fas fa-file-pdf"></i><span class="fn">${f.name}</span><span class="fs">${doc.numPages} pages</span></div>`;document.getElementById('opts').style.display='block';document.getElementById('goBtn').disabled=false;}
function parsePages(str,max){if(!str.trim())return Array.from({length:max},(_,i)=>i+1);const set=new Set();str.split(',').forEach(r=>{r=r.trim();if(r.includes('-')){const[a,b]=r.split('-').map(Number);for(let i=a;i<=Math.min(b,max);i++)set.add(i);}else{const n=parseInt(r);if(n>=1&&n<=max)set.add(n);}});return[...set].sort((a,b)=>a-b);}
function showStatus(msg,type){const s=document.getElementById('status');s.textContent=msg;s.className='status show '+type}
async function go(){
  const btn=document.getElementById('goBtn');btn.disabled=true;
  document.getElementById('prog').classList.add('show');showStatus('Loading PDF and running OCR…','info');
  const lang=document.getElementById('lang').value;
  try{
    const ab=await file.arrayBuffer();const pdfDoc=await pdfjsLib.getDocument({data:ab}).promise;
    const pages=parsePages(document.getElementById('pgrange').value,pdfDoc.numPages);
    const canvas=document.createElement('canvas');const ctx=canvas.getContext('2d');
    let allText='';
    const worker=await Tesseract.createWorker(lang);
    for(let i=0;i<pages.length;i++){
      document.getElementById('pbar').style.width=((i+1)/pages.length*90)+'%';
      showStatus(`OCR page ${pages[i]} of ${pages.length}…`,'info');
      const page=await pdfDoc.getPage(pages[i]);const vp=page.getViewport({scale:2});
      canvas.width=vp.width;canvas.height=vp.height;
      await page.render({canvasContext:ctx,viewport:vp}).promise;
      const {data:{text}}=await worker.recognize(canvas);
      allText+=`\n--- Page ${pages[i]} ---\n${text}\n`;
    }
    await worker.terminate();
    extractedText=allText.trim();
    document.getElementById('pbar').style.width='100%';
    document.getElementById('ocrResult').style.display='block';document.getElementById('ocrResult').textContent=extractedText;
    document.getElementById('copyRow').style.display='flex';
    showStatus(`✓ OCR complete on ${pages.length} page(s)!`,'success');
  }catch(e){showStatus('Error: '+e.message,'error')}
  btn.disabled=false;
}
function copyText(){navigator.clipboard.writeText(extractedText).then(()=>showStatus('✓ Copied to clipboard!','success'));}
function downloadTxt(){const blob=new Blob([extractedText],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='ocr-text.txt';a.click();}

// Theme Toggle
const themeToggle = document.getElementById('themeToggle');
const html = document.documentElement;

function initTheme() {
  const savedTheme = localStorage.getItem('theme') || 'dark';
  html.setAttribute('data-theme', savedTheme);
  updateThemeToggle(savedTheme);
}

function updateThemeToggle(theme) {
  if (theme === 'dark') {
    themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
  } else {
    themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
  }
}

themeToggle.addEventListener('click', function() {
  const currentTheme = html.getAttribute('data-theme');
  const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', newTheme);
  localStorage.setItem('theme', newTheme);
  updateThemeToggle(newTheme);
});

initTheme();
</script></body></html>
