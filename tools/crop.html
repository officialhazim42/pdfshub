<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Crop PDF – PDFHub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="shared.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
</head><body>
<nav><a class="logo" href="../index.html">PDFHub</a><a class="back" href="../index.html"><i class="fas fa-chevron-left"></i> All Tools</a></nav>
<div class="tool-wrap">
  <div class="tool-header"><div class="tool-icon" style="color:var(--a5)"><i class="fas fa-crop-alt"></i></div><h1>Crop PDF</h1><p>Adjust the visible area of all pages by setting margins to cut.</p></div>
  <div class="drop-area" id="drop" onclick="document.getElementById('fin').click()"><i class="fas fa-cloud-upload-alt"></i><div class="dl">Drop a PDF or click to upload</div></div>
  <input type="file" id="fin" accept=".pdf" hidden/>
  <div class="file-list" id="finfo"></div>
  <div class="options" id="opts" style="display:none">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="opt-row"><label>Top margin (pt)</label><input type="number" id="top" value="0" min="0"/></div>
      <div class="opt-row"><label>Bottom margin (pt)</label><input type="number" id="bottom" value="0" min="0"/></div>
      <div class="opt-row"><label>Left margin (pt)</label><input type="number" id="left" value="0" min="0"/></div>
      <div class="opt-row"><label>Right margin (pt)</label><input type="number" id="right" value="0" min="0"/></div>
    </div>
    <div class="opt-row" style="margin-top:8px"><label>Apply to</label><select id="applyTo"><option value="all">All pages</option><option value="odd">Odd pages</option><option value="even">Even pages</option></select></div>
    <p style="font-size:.75rem;color:var(--muted);margin-top:8px">1 point ≈ 0.35mm. A4 is ~595×842pt, Letter is ~612×792pt.</p>
  </div>
  <div class="action-row">
    <button class="btn btn-primary" id="goBtn" disabled onclick="go()"><i class="fas fa-crop-alt"></i> Crop PDF</button>
    <button class="btn btn-secondary" onclick="location.reload()"><i class="fas fa-redo"></i> Reset</button>
  </div>
  <div class="status" id="status"></div>
  <div class="progress" id="prog"><div class="progress-bar" id="pbar"></div></div>
</div>
<script>
let file=null;
const drop=document.getElementById('drop'),fin=document.getElementById('fin');
fin.onchange=e=>{if(e.target.files[0])loadFile(e.target.files[0])};
drop.ondragover=e=>{e.preventDefault();drop.classList.add('over')};drop.ondragleave=()=>drop.classList.remove('over');
drop.ondrop=e=>{e.preventDefault();drop.classList.remove('over');const f=e.dataTransfer.files[0];if(f?.type==='application/pdf')loadFile(f)};
async function loadFile(f){file=f;const ab=await f.arrayBuffer();const doc=await PDFLib.PDFDocument.load(ab,{ignoreEncryption:true});const pc=doc.getPageCount();document.getElementById('finfo').innerHTML=`<div class="file-item"><i class="fas fa-file-pdf"></i><span class="fn">${f.name}</span><span class="fs">${pc} pages</span></div>`;document.getElementById('opts').style.display='block';document.getElementById('goBtn').disabled=false;}
function showStatus(msg,type){const s=document.getElementById('status');s.textContent=msg;s.className='status show '+type}
async function go(){
  const btn=document.getElementById('goBtn');btn.disabled=true;document.getElementById('prog').classList.add('show');document.getElementById('pbar').style.width='20%';showStatus('Cropping…','info');
  try{
    const t=parseInt(document.getElementById('top').value)||0,b=parseInt(document.getElementById('bottom').value)||0,l=parseInt(document.getElementById('left').value)||0,r=parseInt(document.getElementById('right').value)||0;
    const applyTo=document.getElementById('applyTo').value;
    const ab=await file.arrayBuffer();const doc=await PDFLib.PDFDocument.load(ab,{ignoreEncryption:true});
    doc.getPages().forEach((p,i)=>{
      if(applyTo==='odd'&&(i+1)%2===0)return;
      if(applyTo==='even'&&(i+1)%2===1)return;
      const {width,height}=p.getSize();
      p.setCropBox(l,b,width-l-r,height-t-b);
    });
    document.getElementById('pbar').style.width='90%';const bytes=await doc.save();
    const blob=new Blob([bytes],{type:'application/pdf'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='cropped.pdf';a.click();
    document.getElementById('pbar').style.width='100%';showStatus('✓ Cropped! Download started.','success');
  }catch(e){showStatus('Error: '+e.message,'error')}
  btn.disabled=false;
}
</script></body></html>
