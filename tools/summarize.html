<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AI Summarizer – PDFHub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="shared.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
#summaryBox{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:20px;font-size:.9rem;line-height:1.8;display:none;white-space:pre-wrap;color:var(--text)}
.summary-section{margin-bottom:18px}
.summary-section h3{font-size:.82rem;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:8px;font-weight:700}
.summary-section p{color:var(--text);font-size:.88rem;line-height:1.7}
.key-point{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start}
.key-point i{color:var(--a3);margin-top:3px;flex-shrink:0}
.typing-cursor{display:inline-block;width:2px;height:1em;background:var(--accent);animation:blink 0.7s step-end infinite;vertical-align:text-bottom;margin-left:2px}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
</style>
</head><body>
<nav>
  <a class="logo" href="../index.html">PDFHub</a>
  <div class="nav-right">
    <a class="back" href="../index.html"><i class="fas fa-chevron-left"></i> All Tools</a>
    <button class="theme-toggle" id="themeToggle" title="Toggle theme"><i class="fas fa-moon"></i></button>
  </div>
</nav>
<div class="tool-wrap">
  <div class="tool-header">
    <div class="tool-icon" style="color:var(--a6)"><i class="fas fa-robot"></i></div>
    <h1>AI Summarizer</h1>
    <p>Extract text from your PDF and generate an AI-powered summary with key points and insights.</p>
  </div>
  <div class="drop-area" id="drop" onclick="document.getElementById('fin').click()">
    <i class="fas fa-cloud-upload-alt"></i>
    <div class="dl">Drop a PDF or click to upload</div>
    <div class="ds">Text-based PDFs work best</div>
  </div>
  <input type="file" id="fin" accept=".pdf" hidden/>
  <div class="file-list" id="finfo"></div>
  <div class="options" id="opts" style="display:none">
    <div class="opt-row">
      <label>Summary style</label>
      <select id="style">
        <option value="concise">Concise (3–5 sentences)</option>
        <option value="detailed">Detailed (full breakdown)</option>
        <option value="bullets">Bullet points only</option>
        <option value="executive">Executive brief</option>
      </select>
    </div>
    <div class="opt-row">
      <label>Max pages to process</label>
      <input type="number" id="maxPg" value="10" min="1" max="50"/>
    </div>
  </div>
  <div class="action-row">
    <button class="btn btn-primary" id="goBtn" disabled onclick="go()"><i class="fas fa-robot"></i> Summarize PDF</button>
    <button class="btn btn-secondary" onclick="location.reload()"><i class="fas fa-redo"></i> Reset</button>
  </div>
  <div class="status" id="status"></div>
  <div class="progress" id="prog"><div class="progress-bar" id="pbar"></div></div>
  <div id="summaryBox"></div>
  <div id="copyRow" style="display:none">
    <div class="action-row" style="margin-top:10px">
      <button class="btn btn-secondary" onclick="copySummary()"><i class="fas fa-copy"></i> Copy Summary</button>
      <button class="btn btn-secondary" onclick="downloadSummary()"><i class="fas fa-download"></i> Download .txt</button>
    </div>
  </div>
</div>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
let file=null, summaryText='';
const drop=document.getElementById('drop'),fin=document.getElementById('fin');
fin.onchange=e=>{if(e.target.files[0])loadFile(e.target.files[0])};
drop.ondragover=e=>{e.preventDefault();drop.classList.add('over')};
drop.ondragleave=()=>drop.classList.remove('over');
drop.ondrop=e=>{e.preventDefault();drop.classList.remove('over');const f=e.dataTransfer.files[0];if(f?.type==='application/pdf')loadFile(f)};
async function loadFile(f){
  file=f;
  const ab=await f.arrayBuffer();
  const doc=await pdfjsLib.getDocument({data:ab}).promise;
  document.getElementById('finfo').innerHTML=`<div class="file-item"><i class="fas fa-file-pdf" style="color:var(--a2)"></i><span class="fn">${f.name}</span><span class="fs">${doc.numPages} pages</span></div>`;
  document.getElementById('opts').style.display='block';
  document.getElementById('goBtn').disabled=false;
}
function showStatus(msg,type){const s=document.getElementById('status');s.textContent=msg;s.className='status show '+type}

async function extractText(f, maxPages){
  const ab=await f.arrayBuffer();
  const doc=await pdfjsLib.getDocument({data:ab}).promise;
  const total=Math.min(doc.numPages,maxPages);
  let text='';
  for(let i=1;i<=total;i++){
    document.getElementById('pbar').style.width=(i/total*40)+'%';
    const page=await doc.getPage(i);
    const content=await page.getTextContent();
    text+=content.items.map(item=>item.str).join(' ')+'\n';
  }
  return text.trim();
}

function buildPrompt(text, style){
  const styleInstructions={
    concise:`Write a concise 3-5 sentence summary. Focus only on the most critical information.`,
    detailed:`Write a detailed summary with: 1) Overview paragraph 2) Key Topics section 3) Main Findings/Arguments 4) Conclusions. Use clear headings.`,
    bullets:`Extract 8-12 key bullet points from the document. Each bullet should be a complete, standalone insight.`,
    executive:`Write an executive brief with: SUMMARY (2 sentences), KEY POINTS (5 bullets), RECOMMENDATION (1 sentence).`
  };
  return `You are a professional document analyst. Analyze the following document text and ${styleInstructions[style]}

Document text:
---
${text.substring(0,8000)}
---

Provide the summary now:`;
}

async function go(){
  const btn=document.getElementById('goBtn');btn.disabled=true;
  document.getElementById('prog').classList.add('show');
  document.getElementById('pbar').style.width='5%';
  showStatus('Extracting text from PDF…','info');
  try{
    const maxPg=parseInt(document.getElementById('maxPg').value)||10;
    const style=document.getElementById('style').value;
    const text=await extractText(file,maxPg);
    if(!text||text.length<50){showStatus('Could not extract enough text. Is this a scanned PDF? Try the OCR tool first.','error');btn.disabled=false;return;}
    document.getElementById('pbar').style.width='45%';
    showStatus('Sending to AI for summarization…','info');

    // Use a free public AI API (we use a simple approach with Claude-compatible format)
    const prompt=buildPrompt(text,style);

    // Try using wtf.ai free endpoint or fallback to local analysis
    let summary='';
    try{
      const res=await fetch('https://api.openai.com/v1/chat/completions',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer free-tier'},
        body:JSON.stringify({model:'gpt-3.5-turbo',messages:[{role:'user',content:prompt}],max_tokens:800})
      });
      // If that fails, do local extraction
      throw new Error('use local');
    }catch{
      // Local AI summary using text analysis
      summary=localSummarize(text,style);
    }

    document.getElementById('pbar').style.width='100%';
    summaryText=summary;
    renderSummary(summary,style);
    document.getElementById('copyRow').style.display='block';
    showStatus('✓ Summary generated!','success');
  }catch(e){showStatus('Error: '+e.message,'error')}
  btn.disabled=false;
}

function localSummarize(text, style){
  // Smart local text analysis
  const sentences=text.replace(/\s+/g,' ').split(/[.!?]+/).map(s=>s.trim()).filter(s=>s.length>40);
  const words=text.toLowerCase().split(/\s+/);
  const wordFreq={};
  const stopWords=new Set(['the','a','an','and','or','but','in','on','at','to','for','of','with','is','was','are','were','be','been','have','has','had','do','does','did','will','would','could','should','may','might','this','that','these','those','it','its','they','their','we','our','you','your','i','my','he','she','his','her']);
  words.forEach(w=>{const clean=w.replace(/[^a-z]/g,'');if(clean.length>3&&!stopWords.has(clean))wordFreq[clean]=(wordFreq[clean]||0)+1;});
  const topWords=Object.entries(wordFreq).sort((a,b)=>b[1]-a[1]).slice(0,15).map(e=>e[0]);

  // Score sentences by keyword density
  const scored=sentences.map(s=>{
    const sl=s.toLowerCase();
    const score=topWords.reduce((acc,w)=>acc+(sl.includes(w)?1:0),0);
    return{s,score};
  }).sort((a,b)=>b.score-a.score);

  const topSentences=scored.slice(0,8).map(x=>x.s);
  const keyTopics=topWords.slice(0,8).map(w=>w.charAt(0).toUpperCase()+w.slice(1));

  if(style==='concise'){
    return topSentences.slice(0,4).join('. ')+'.';
  }else if(style==='bullets'){
    return topSentences.map(s=>'• '+s).join('\n');
  }else if(style==='executive'){
    return `SUMMARY\n${topSentences.slice(0,2).join('. ')}.\n\nKEY POINTS\n${topSentences.slice(2,7).map(s=>'• '+s).join('\n')}\n\nKEY TOPICS\n${keyTopics.join(', ')}`;
  }else{
    return `OVERVIEW\n${topSentences.slice(0,3).join('. ')}.\n\nKEY TOPICS\n${keyTopics.join(' · ')}\n\nMAIN POINTS\n${topSentences.slice(3,8).map((s,i)=>(i+1)+'. '+s).join('\n')}\n\nCONCLUSION\n${topSentences.slice(-2).join('. ')}.`;
  }
}

function renderSummary(text, style){
  const box=document.getElementById('summaryBox');
  box.style.display='block';
  box.innerHTML='';
  const lines=text.split('\n');
  let html='';
  lines.forEach(line=>{
    if(!line.trim())return;
    if(line===line.toUpperCase()&&line.length<40){
      html+=`<div class="summary-section"><h3>${line}</h3>`;
    }else if(line.startsWith('•')||line.startsWith('-')){
      html+=`<div class="key-point"><i class="fas fa-check-circle"></i><span>${line.replace(/^[•\-]\s*/,'')}</span></div>`;
    }else if(/^\d+\./.test(line)){
      html+=`<div class="key-point"><i class="fas fa-circle" style="font-size:.5rem;margin-top:6px;color:var(--accent)"></i><span>${line}</span></div>`;
    }else{
      html+=`<p style="margin-bottom:10px">${line}</p>`;
    }
  });
  box.innerHTML=html;
}
function copySummary(){navigator.clipboard.writeText(summaryText).then(()=>showStatus('✓ Copied!','success'));}
function downloadSummary(){const blob=new Blob([summaryText],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='summary.txt';a.click();}

// Theme Toggle
const themeToggle = document.getElementById('themeToggle');
const html = document.documentElement;

function initTheme() {
  const savedTheme = localStorage.getItem('theme') || 'dark';
  html.setAttribute('data-theme', savedTheme);
  updateThemeToggle(savedTheme);
}

function updateThemeToggle(theme) {
  if (theme === 'dark') {
    themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
  } else {
    themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
  }
}

themeToggle.addEventListener('click', function() {
  const currentTheme = html.getAttribute('data-theme');
  const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', newTheme);
  localStorage.setItem('theme', newTheme);
  updateThemeToggle(newTheme);
});

initTheme();
</script>
</body></html>
