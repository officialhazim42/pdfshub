<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Organize PDF – PDFHub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="shared.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
#pagesGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:12px;margin-bottom:20px}
.pg-card{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:8px;text-align:center;cursor:grab;position:relative;user-select:none;transition:box-shadow .2s,border-color .2s}
.pg-card.dragging{opacity:.4;border-color:var(--accent)}
.pg-card.over{border-color:var(--accent);box-shadow:0 0 0 2px rgba(124,106,255,.4)}
.pg-card canvas{width:100%;border-radius:6px}
.pg-num{font-size:.72rem;color:var(--muted);margin-top:5px}
.pg-card .del-pg{position:absolute;top:4px;right:4px;background:var(--a2);color:#fff;border:none;border-radius:4px;width:20px;height:20px;font-size:.6rem;cursor:pointer;display:none;align-items:center;justify-content:center}
.pg-card:hover .del-pg{display:flex}
.pg-card .rot-pg{position:absolute;top:4px;left:4px;background:var(--accent);color:#fff;border:none;border-radius:4px;width:20px;height:20px;font-size:.6rem;cursor:pointer;display:none;align-items:center;justify-content:center}
.pg-card:hover .rot-pg{display:flex}
</style>
</head><body>
<nav><a class="logo" href="../index.html">PDFHub</a><a class="back" href="../index.html"><i class="fas fa-chevron-left"></i> All Tools</a></nav>
<div class="tool-wrap">
  <div class="tool-header"><div class="tool-icon" style="color:var(--accent)"><i class="fas fa-th-large"></i></div><h1>Organize PDF</h1><p>Drag pages to reorder, rotate individual pages, or delete unwanted ones.</p></div>
  <div class="drop-area" id="drop" onclick="document.getElementById('fin').click()"><i class="fas fa-cloud-upload-alt"></i><div class="dl">Drop a PDF or click to upload</div></div>
  <input type="file" id="fin" accept=".pdf" hidden/>
  <div id="editor" style="display:none">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">
      <span id="pageCount" style="font-size:.85rem;color:var(--muted)"></span>
      <button class="btn btn-secondary" style="font-size:.78rem;padding:6px 12px" onclick="rotateAll(90)"><i class="fas fa-redo"></i> Rotate All</button>
    </div>
    <div id="pagesGrid"></div>
    <div class="action-row">
      <button class="btn btn-primary" onclick="save()"><i class="fas fa-download"></i> Save Organized PDF</button>
      <button class="btn btn-secondary" onclick="location.reload()"><i class="fas fa-redo"></i> Reset</button>
    </div>
    <div class="status" id="status"></div>
    <div class="progress" id="prog"><div class="progress-bar" id="pbar"></div></div>
  </div>
</div>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
let file=null,pdfJsDoc=null,pageOrder=[],pageRotations=[];
const drop=document.getElementById('drop'),fin=document.getElementById('fin');
fin.onchange=e=>{if(e.target.files[0])loadFile(e.target.files[0])};
drop.ondragover=e=>{e.preventDefault();drop.classList.add('over')};drop.ondragleave=()=>drop.classList.remove('over');
drop.ondrop=e=>{e.preventDefault();drop.classList.remove('over');const f=e.dataTransfer.files[0];if(f?.type==='application/pdf')loadFile(f)};
async function loadFile(f){
  file=f;showStatus('Loading…','info');
  const ab=await f.arrayBuffer();pdfJsDoc=await pdfjsLib.getDocument({data:ab}).promise;
  pageOrder=Array.from({length:pdfJsDoc.numPages},(_,i)=>i+1);
  pageRotations=new Array(pdfJsDoc.numPages).fill(0);
  document.getElementById('editor').style.display='block';drop.style.display='none';
  showStatus('','');renderGrid();
}
async function renderGrid(){
  const grid=document.getElementById('pagesGrid');grid.innerHTML='';
  document.getElementById('pageCount').textContent=`${pageOrder.length} page(s)`;
  for(let i=0;i<pageOrder.length;i++){
    const origIdx=pageOrder[i]-1;
    const card=document.createElement('div');card.className='pg-card';card.draggable=true;card.dataset.i=i;
    const c=document.createElement('canvas');card.appendChild(c);
    const pn=document.createElement('div');pn.className='pg-num';pn.textContent=`Page ${i+1}`;card.appendChild(pn);
    const del=document.createElement('button');del.className='del-pg';del.innerHTML='<i class="fas fa-times"></i>';del.onclick=()=>{pageOrder.splice(i,1);pageRotations.splice(i,1);renderGrid();};card.appendChild(del);
    const rot=document.createElement('button');rot.className='rot-pg';rot.innerHTML='<i class="fas fa-redo"></i>';rot.onclick=()=>{pageRotations[i]=(pageRotations[i]+90)%360;renderGrid();};card.appendChild(rot);
    grid.appendChild(card);
    // drag
    card.ondragstart=e=>{e.dataTransfer.setData('text/plain',i);card.classList.add('dragging')};
    card.ondragend=()=>card.classList.remove('dragging');
    card.ondragover=e=>{e.preventDefault();card.classList.add('over')};
    card.ondragleave=()=>card.classList.remove('over');
    card.ondrop=e=>{e.preventDefault();card.classList.remove('over');const from=parseInt(e.dataTransfer.getData('text/plain'));const to=i;if(from===to)return;const op=pageOrder.splice(from,1)[0];pageOrder.splice(to,0,op);const or=pageRotations.splice(from,1)[0];pageRotations.splice(to,0,or);renderGrid();};
    // render thumbnail
    const page=await pdfJsDoc.getPage(pageOrder[i]);
    const vp=page.getViewport({scale:0.5,rotation:pageRotations[i]});
    c.width=vp.width;c.height=vp.height;
    await page.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;
  }
}
function rotateAll(deg){pageRotations=pageRotations.map(r=>(r+deg)%360);renderGrid();}
function showStatus(msg,type){const s=document.getElementById('status');s.textContent=msg;s.className='status '+(msg?'show ':'')+type}
async function save(){
  showStatus('Saving…','info');document.getElementById('prog').classList.add('show');document.getElementById('pbar').style.width='10%';
  try{
    const ab=await file.arrayBuffer();const src=await PDFLib.PDFDocument.load(ab,{ignoreEncryption:true});
    const out=await PDFLib.PDFDocument.create();
    const indices=pageOrder.map(n=>n-1);const copied=await out.copyPages(src,indices);
    copied.forEach((p,i)=>{
      if(pageRotations[i])p.setRotation(PDFLib.degrees((p.getRotation().angle+pageRotations[i])%360));
      out.addPage(p);
    });
    document.getElementById('pbar').style.width='90%';
    const bytes=await out.save();const blob=new Blob([bytes],{type:'application/pdf'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='organized.pdf';a.click();
    document.getElementById('pbar').style.width='100%';showStatus('✓ Saved!','success');
  }catch(e){showStatus('Error: '+e.message,'error')}
}
</script></body></html>
