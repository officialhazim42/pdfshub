<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Split PDF – PDFHub</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="shared.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
</head>
<body>
<nav><a class="logo" href="../index.html">PDFHub</a><a class="back" href="../index.html"><i class="fas fa-chevron-left"></i> All Tools</a></nav>
<div class="tool-wrap">
  <div class="tool-header">
    <div class="tool-icon" style="color:var(--accent)"><i class="fas fa-cut"></i></div>
    <h1>Split PDF</h1>
    <p>Split a PDF by page range or extract every page as a separate file.</p>
  </div>
  <div class="drop-area" id="drop" onclick="document.getElementById('fin').click()">
    <i class="fas fa-cloud-upload-alt"></i>
    <div class="dl">Drop a PDF here or click to upload</div>
    <div class="ds">Single PDF file</div>
  </div>
  <input type="file" id="fin" accept=".pdf" hidden/>
  <div class="file-list" id="finfo"></div>
  <div class="options" id="opts" style="display:none">
    <div class="opt-row">
      <label>Split mode</label>
      <select id="mode" onchange="modeChange()">
        <option value="range">By page range (e.g. 1-3, 4-6)</option>
        <option value="each">Every page as separate PDF</option>
        <option value="every">Every N pages</option>
      </select>
    </div>
    <div class="opt-row" id="rangeRow">
      <label>Page ranges (comma-separated, e.g. 1-3, 4-7, 8)</label>
      <input type="text" id="ranges" placeholder="1-3, 4-6, 7"/>
    </div>
    <div class="opt-row" id="everyRow" style="display:none">
      <label>Split every N pages</label>
      <input type="number" id="everyN" value="1" min="1"/>
    </div>
  </div>
  <div class="action-row">
    <button class="btn btn-primary" id="splitBtn" disabled onclick="splitPDF()"><i class="fas fa-cut"></i> Split PDF</button>
    <button class="btn btn-secondary" onclick="clearAll()"><i class="fas fa-trash"></i> Clear</button>
  </div>
  <div class="status" id="status"></div>
  <div class="progress" id="prog"><div class="progress-bar" id="pbar"></div></div>
</div>
<script>
let file=null,pageCount=0;
const drop=document.getElementById('drop'),fin=document.getElementById('fin');
fin.onchange=e=>{if(e.target.files[0])loadFile(e.target.files[0])};
drop.ondragover=e=>{e.preventDefault();drop.classList.add('over')};
drop.ondragleave=()=>drop.classList.remove('over');
drop.ondrop=e=>{e.preventDefault();drop.classList.remove('over');const f=e.dataTransfer.files[0];if(f?.type==='application/pdf')loadFile(f)};
async function loadFile(f){
  file=f;
  const ab=await f.arrayBuffer();
  const doc=await PDFLib.PDFDocument.load(ab,{ignoreEncryption:true});
  pageCount=doc.getPageCount();
  document.getElementById('finfo').innerHTML=`<div class="file-item"><i class="fas fa-file-pdf"></i><span class="fn">${f.name}</span><span class="fs">${pageCount} pages · ${(f.size/1024/1024).toFixed(2)} MB</span></div>`;
  document.getElementById('opts').style.display='block';
  document.getElementById('splitBtn').disabled=false;
  document.getElementById('ranges').placeholder=`e.g. 1-${Math.ceil(pageCount/2)}, ${Math.ceil(pageCount/2)+1}-${pageCount}`;
}
function modeChange(){
  const m=document.getElementById('mode').value;
  document.getElementById('rangeRow').style.display=m==='range'?'':'none';
  document.getElementById('everyRow').style.display=m==='every'?'':'none';
}
function clearAll(){file=null;document.getElementById('finfo').innerHTML='';document.getElementById('opts').style.display='none';document.getElementById('splitBtn').disabled=true;showStatus('','');document.getElementById('prog').classList.remove('show')}
function showStatus(msg,type){const s=document.getElementById('status');s.textContent=msg;s.className='status show '+type}
function parseRanges(str,max){
  return str.split(',').map(r=>{
    r=r.trim();
    if(r.includes('-')){const[a,b]=r.split('-').map(Number);return{from:a-1,to:Math.min(b,max)-1}}
    const n=parseInt(r);return{from:n-1,to:n-1};
  }).filter(r=>r.from>=0&&r.to<max&&r.from<=r.to);
}
async function splitPDF(){
  const btn=document.getElementById('splitBtn');btn.disabled=true;
  const prog=document.getElementById('prog'),pbar=document.getElementById('pbar');
  prog.classList.add('show');pbar.style.width='10%';
  showStatus('Splitting…','info');
  try{
    const ab=await file.arrayBuffer();
    const src=await PDFLib.PDFDocument.load(ab,{ignoreEncryption:true});
    const mode=document.getElementById('mode').value;
    let groups=[];
    if(mode==='each'){groups=Array.from({length:pageCount},(_,i)=>({from:i,to:i,label:`page-${i+1}`}))}
    else if(mode==='every'){const n=parseInt(document.getElementById('everyN').value)||1;for(let i=0;i<pageCount;i+=n)groups.push({from:i,to:Math.min(i+n-1,pageCount-1),label:`pages-${i+1}-${Math.min(i+n,pageCount)}`})}
    else{const rng=parseRanges(document.getElementById('ranges').value,pageCount);if(!rng.length){showStatus('Enter valid page ranges','error');btn.disabled=false;return;}groups=rng.map(r=>({...r,label:`pages-${r.from+1}-${r.to+1}`}))}
    for(let i=0;i<groups.length;i++){
      pbar.style.width=((i+1)/groups.length*85+10)+'%';
      const g=groups[i];const out=await PDFLib.PDFDocument.create();
      const pages=await out.copyPages(src,Array.from({length:g.to-g.from+1},(_,j)=>g.from+j));
      pages.forEach(p=>out.addPage(p));
      const bytes=await out.save();
      download(bytes,`${file.name.replace('.pdf','')}-${g.label}.pdf`);
      if(groups.length>1)await new Promise(r=>setTimeout(r,200));
    }
    pbar.style.width='100%';
    showStatus(`✓ Created ${groups.length} file(s)!`,'success');
  }catch(e){showStatus('Error: '+e.message,'error')}
  btn.disabled=false;
}
function download(bytes,name){const blob=new Blob([bytes],{type:'application/pdf'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click()}
</script>
</body></html>
