<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Merger Pro</title>
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>
:root{
--primary:#4e73df;
--success:#1cc88a;
--bg:#f4f6f9;
--card:#ffffff;
--text:#333;
}

body.dark{
--bg:#1e1e2f;
--card:#2c2c3e;
--text:#fff;
}

body{
margin:0;
font-family:Segoe UI, sans-serif;
background:var(--bg);
color:var(--text);
transition:.3s;
}

header{
background:var(--primary);
color:white;
padding:15px;
text-align:center;
font-size:20px;
font-weight:bold;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
}

.toggle{
cursor:pointer;
background:white;
color:var(--primary);
padding:5px 10px;
border-radius:20px;
font-size:14px;
}

.container{
max-width:600px;
margin:30px auto;
background:var(--card);
padding:25px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.drop-area{
border:2px dashed var(--primary);
padding:30px;
text-align:center;
border-radius:10px;
cursor:pointer;
margin-bottom:20px;
}

.drop-area.dragover{
background:rgba(78,115,223,0.1);
}

.file-list{
margin-top:15px;
}

.file-item{
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.05);
padding:8px 10px;
margin:5px 0;
border-radius:8px;
font-size:14px;
}

.actions button{
margin-left:5px;
border:none;
padding:4px 8px;
border-radius:5px;
cursor:pointer;
font-size:12px;
}

.up{background:#36b9cc;color:white;}
.down{background:#858796;color:white;}
.remove{background:#e74a3b;color:white;}

.merge-btn{
width:100%;
margin-top:20px;
padding:12px;
background:var(--success);
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}

.progress{
height:8px;
background:#ddd;
border-radius:10px;
margin-top:15px;
overflow:hidden;
display:none;
}

.progress-bar{
height:100%;
width:0%;
background:var(--primary);
}

.download{
display:none;
margin-top:15px;
text-align:center;
}

.download a{
background:var(--primary);
color:white;
padding:10px 15px;
border-radius:8px;
text-decoration:none;
}
</style>
</head>

<body>

<header>
PDF Merger Pro
<div class="toggle" onclick="toggleMode()">🌙 Mode</div>
</header>

<div class="container">

<div class="drop-area" id="dropArea">
📂 Drag & Drop PDFs Here<br>or Click to Select
<input type="file" id="fileInput" multiple accept="application/pdf" hidden>
</div>

<div class="file-list" id="fileList"></div>

<button class="merge-btn" onclick="mergePDFs()">Merge PDFs</button>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<div class="download" id="downloadSection">
<a id="downloadLink">Download Merged PDF</a>
</div>

</div>

<script>
let filesArray = [];

const dropArea = document.getElementById("dropArea");
const fileInput = document.getElementById("fileInput");
const fileList = document.getElementById("fileList");

dropArea.onclick = () => fileInput.click();

fileInput.addEventListener("change", (e)=>{
addFiles(e.target.files);
});

dropArea.addEventListener("dragover",(e)=>{
e.preventDefault();
dropArea.classList.add("dragover");
});

dropArea.addEventListener("dragleave",()=>{
dropArea.classList.remove("dragover");
});

dropArea.addEventListener("drop",(e)=>{
e.preventDefault();
dropArea.classList.remove("dragover");
addFiles(e.dataTransfer.files);
});

function addFiles(newFiles){
for(let file of newFiles){
if(file.type === "application/pdf"){
filesArray.push(file);
}
}
renderList();
}

function renderList(){
fileList.innerHTML="";
filesArray.forEach((file,index)=>{
let size = (file.size/1024).toFixed(1)+" KB";

fileList.innerHTML += `
<div class="file-item">
<div>${file.name} (${size})</div>
<div class="actions">
<button class="up" onclick="moveUp(${index})">↑</button>
<button class="down" onclick="moveDown(${index})">↓</button>
<button class="remove" onclick="removeFile(${index})">X</button>
</div>
</div>
`;
});
}

function moveUp(i){
if(i>0){
[filesArray[i],filesArray[i-1]]=[filesArray[i-1],filesArray[i]];
renderList();
}
}

function moveDown(i){
if(i<filesArray.length-1){
[filesArray[i],filesArray[i+1]]=[filesArray[i+1],filesArray[i]];
renderList();
}
}

function removeFile(i){
filesArray.splice(i,1);
renderList();
}

async function mergePDFs(){
if(filesArray.length<2){
alert("Select at least 2 PDFs");
return;
}

const { PDFDocument } = PDFLib;
const mergedPdf = await PDFDocument.create();

document.querySelector(".progress").style.display="block";
let progressBar = document.getElementById("progressBar");

for(let i=0;i<filesArray.length;i++){
let arrayBuffer = await filesArray[i].arrayBuffer();
let pdf = await PDFDocument.load(arrayBuffer);
let pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
pages.forEach(page=>mergedPdf.addPage(page));

progressBar.style.width = ((i+1)/filesArray.length)*100+"%";
}

const mergedBytes = await mergedPdf.save();
const blob = new Blob([mergedBytes],{type:"application/pdf"});

const link = document.getElementById("downloadLink");
link.href = URL.createObjectURL(blob);
link.download = "Merged_PDF.pdf";

document.getElementById("downloadSection").style.display="block";
}

function toggleMode(){
document.body.classList.toggle("dark");
}
</script>

</body>
</html>
